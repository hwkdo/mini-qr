---
services:
  mini-qr:
    image: ghcr.io/hwkdo/mini-qr:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BASE_PATH: ${BASE_PATH:-/}
        VITE_HIDE_CREDITS: ${HIDE_CREDITS:-false}
        VITE_DEFAULT_PRESET: ${VITE_DEFAULT_PRESET:-${DEFAULT_PRESET:-}}
        VITE_DEFAULT_DATA_TO_ENCODE: ${DEFAULT_DATA:-}
        VITE_QR_CODE_PRESETS: ${VITE_QR_CODE_PRESETS:-}
        VITE_FRAME_PRESET: ${FRAME_PRESET:-}
        VITE_FRAME_PRESETS: ${FRAME_PRESETS:-}
        VITE_DISABLE_LOCAL_STORAGE: ${DISABLE_LOCAL_STORAGE:-false}
    container_name: mini-qr
    restart: unless-stopped
    networks:
      - mini-qr-network

  nginx-proxy:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - 80:80
    restart: unless-stopped
    configs:
      - source: nginx-proxy-conf
        target: /etc/nginx/nginx.conf
    depends_on:
      - mini-qr
    networks:
      - mini-qr-network

configs:
  nginx-proxy-conf:
    content: |
      events {
          worker_connections 1024;
      }
      http {
          include       /etc/nginx/mime.types;
          default_type  application/octet-stream;
          sendfile      on;
          keepalive_timeout 65;
          upstream mini-qr-backend {
              server mini-qr:8080;
          }
          server {
              listen 80;
              server_name localhost;
              location / {
                  proxy_pass http://mini-qr-backend;
                  proxy_set_header Host $$host;
                  proxy_set_header X-Real-IP $$remote_addr;
                  proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $$scheme;
              }
              location /health {
                  access_log off;
                  return 200 "healthy\n";
                  add_header Content-Type text/plain;
              }
              error_page 500 502 503 504 /50x.html;
              location = /50x.html {
                  root /usr/share/nginx/html;
              }
          }
      }

networks:
  mini-qr-network:
    driver: bridge
